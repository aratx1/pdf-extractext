version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: mongo_dev
    restart: unless-stopped

    ports:
      - "27017:27017"

    env_file:
      - mongo.env

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

    volumes:
      - ./data:/data/db

    networks:
      - dev_network

networks:
  dev_network:
    external: true
